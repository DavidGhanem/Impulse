  <text x="100" y="458" font-family="Georgia, serif" font-size="28" fill="rgba(255,255,255,0.55)" letter-spacing="0.5" style="fill:rgba(255, 255, 255, 0.55);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:28px;font-weight:400;text-anchor:start;dominant-baseline:auto">We help you catch it.</text>

