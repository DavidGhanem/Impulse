  <mask id="imagine-text-gaps-1ujhol" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="1210" height="640" fill="white"/><rect x="96" y="250.23524475097656" width="473.70709228515625" height="112.30545043945312" fill="black" rx="2"/><rect x="96" y="391.8572998046875" width="376.7987365722656" height="35.74470138549805" fill="black" rx="2"/><rect x="94.1326675415039" y="429.8572998046875" width="277.91748046875" height="35.74470138549805" fill="black" rx="2"/><rect x="971.4232788085938" y="567.9286499023438" width="155.4955596923828" height="20.806018829345703" fill="black" rx="2"/></mask></defs>

