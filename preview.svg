  <text x="1050" y="583" font-family="Georgia, serif" font-size="15" fill="rgba(255,255,255,0.35)" text-anchor="middle" style="fill:rgba(255, 255, 255, 0.35);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:15px;font-weight:400;text-anchor:middle;dominant-baseline:auto">impulsegrowth.online</text>

